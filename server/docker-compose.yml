version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: lager-im-postgres
    environment:
      POSTGRES_USER: lager_im
      POSTGRES_PASSWORD: lager_im_secret
      POSTGRES_DB: lager_im
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U lager_im"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
